name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}
  # Az "Árfolyamok frissítése" workflow GITHUB_TOKEN-nel commitol, ami magától
  # NEM indít push-deployt — ezért a befejezése után közvetlenül futtatjuk.
  workflow_run:
    workflows: ['Árfolyamok frissítése']
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    # workflow_run esetén csak sikeres árfrissítés után deployoljunk.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: actions/configure-pages@v6
        with:
          enablement: true # kapcsolja be a Pages-t, ha még nincs
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
